# docker-compose.services.yml — optional AI/Code services for the macOS app.
#
# The macOS app manages these containers via /api/services/start and /api/services/stop.
# The full Docker deployment (make up-bg) uses docker-compose.yml instead, which
# also starts the studytrack Node.js container.
#
# Usage (manual):
#   docker compose -f docker-compose.services.yml up -d
#   docker compose -f docker-compose.services.yml down

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: studytrack-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: studytrack-piston
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "2000:2000"
    privileged: true
    volumes:
      - piston-data:/piston

volumes:
  chroma-data:
  piston-data:
